name: Daily Genetics Paper Digests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # GitHub Actions uses UTC.
    # During daylight saving time in Madison/Chicago:
    # 14:20 UTC = 9:20 AM Central Daylight Time
    # 14:25 UTC = 9:25 AM Central Daylight Time
    - cron: "20 14 * * *"
    - cron: "25 14 * * *"

  workflow_dispatch:

jobs:
  run-digests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run broad AI/genomics digest
        if: github.event.schedule == '20 14 * * *' || github.event_name == 'workflow_dispatch'
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python genetics_ai_updates.py

      - name: Run useful ML methods digest
        if: github.event.schedule == '25 14 * * *' || github.event_name == 'workflow_dispatch'
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python genetics_ml_methods_updates.py

